<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --nw: #174a5b; --nw-light: #e8f0f3; --nw-mid: #2a6e87; --nw-dark: #0f3340; --font: system-ui, -apple-system, sans-serif; }
html, body { width: 100%; min-height: 100vh; background: #f0f4f6; }
.wrap { max-width: 600px; width: 100%; margin: 0 auto; font-family: var(--font); background: #fff; min-height: 100vh; display: flex; flex-direction: column; }
.header { background: var(--nw); padding: 1rem 1.2rem; display: flex; align-items: center; gap: 12px; }
.header img { width: 64px; height: auto; object-fit: contain; flex-shrink: 0; }
.header-text h1 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 2px; line-height: 1.3; }
.header-text p { font-size: 12px; color: rgba(255,255,255,0.6); }
.subbar { display: flex; padding: 0.8rem 1.2rem 0; }
.lang-toggle { display: flex; gap: 7px; }
.lang-btn { padding: 6px 16px; border-radius: 6px; border: 1px solid var(--nw); background: transparent; color: var(--nw); font-size: 13px; cursor: pointer; font-family: var(--font); -webkit-tap-highlight-color: transparent; }
.lang-btn.active { background: var(--nw); color: #fff; }
.body { padding: 0.8rem 1.2rem 1.4rem; flex: 1; display: flex; flex-direction: column; }
.progress-bar { height: 4px; background: var(--nw-light); border-radius: 2px; margin-bottom: 1.1rem; overflow: hidden; }
.progress-fill { height: 100%; background: var(--nw); border-radius: 2px; transition: width 0.4s ease; }
.step-card { background: #f8fafb; border: 0.5px solid #cdd8dc; border-radius: 12px; padding: 1rem 1.1rem; flex: 1; }
.step-card.active { border: 1.5px solid var(--nw); }
.step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 0.6rem; }
.step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--nw); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
.step-num.done { background: #1a7a4a; }
.step-title { font-size: 16px; font-weight: 600; color: #1a2e36; line-height: 1.3; }
.step-body { margin-left: 42px; font-size: 14px; color: #4a6270; line-height: 1.7; }
.tip { display: flex; gap: 8px; align-items: flex-start; background: var(--nw-light); border-radius: 6px; padding: 8px 11px; margin-top: 0.6rem; font-size: 13px; color: var(--nw-dark); border-left: 3px solid var(--nw); }
.check-btn { margin-top: 0.8rem; padding: 9px 14px; border-radius: 8px; border: 1.5px solid var(--nw); background: transparent; color: var(--nw); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: var(--font); -webkit-tap-highlight-color: transparent; width: 100%; justify-content: center; }
.check-btn.done-btn { background: #e6f5ee; color: #1a7a4a; border-color: #1a7a4a; }
.nav-row { display: flex; gap: 10px; margin-top: 1rem; }
.nav-btn { flex: 1; padding: 13px; border-radius: 8px; border: 1.5px solid var(--nw); background: transparent; color: var(--nw); font-size: 15px; cursor: pointer; font-family: var(--font); -webkit-tap-highlight-color: transparent; min-height: 48px; }
.nav-btn.primary { background: var(--nw); color: #fff; border-color: transparent; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.counter { font-size: 12px; color: #8aa4ad; text-align: center; margin-top: 0.5rem; }
.complete-msg { text-align: center; padding: 2.5rem 1rem; }
.complete-msg h2 { font-size: 20px; font-weight: 600; color: var(--nw); margin-bottom: 0.5rem; }
.complete-msg p { font-size: 14px; color: #4a6270; }
.restart-btn { margin-top: 1.2rem; padding: 12px 28px; border-radius: 8px; border: 1.5px solid var(--nw); background: transparent; color: var(--nw); font-size: 14px; cursor: pointer; font-family: var(--font); min-height: 48px; -webkit-tap-highlight-color: transparent; }
svg { touch-action: none; }

@media (max-width: 400px) {
  .header img { width: 52px; }
  .header-text h1 { font-size: 14px; }
  .step-title { font-size: 15px; }
  .step-body { font-size: 13.5px; margin-left: 38px; }
  .body { padding: 0.7rem 0.9rem 1.2rem; }
  .subbar { padding: 0.7rem 0.9rem 0; }
  .header { padding: 0.9rem 0.9rem; }
}
</style>

<div class="wrap">
  <div class="header">
    <img id="logo" src="" alt="niuway logo">
    <div class="header-text">
      <h1>Pavillon Aufbauanleitung</h1>
      <p>Assembly Guide · niuway AG</p>
    </div>
  </div>
  <div class="subbar">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('de')">Deutsch</button>
      <button class="lang-btn" onclick="setLang('en')">English</button>
    </div>
  </div>
  <div class="body">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="steps-container"></div>
    <div class="nav-row" id="nav-row">
      <button class="nav-btn" id="prev-btn" onclick="prevStep()" disabled>← <span id="prev-label">Zurück</span></button>
      <button class="nav-btn primary" id="next-btn" onclick="nextStep()"><span id="next-label">Weiter</span> →</button>
    </div>
    <div class="counter" id="counter"></div>
  </div>
</div>

}

let lang = 'de', current = 0, checked = new Array(6).fill(false);
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', (l==='de'&&b.textContent==='Deutsch')||(l==='en'&&b.textContent==='English')));
  render();
}
function render() {
  const d = data[lang], total = d.steps.length;
  document.getElementById('progress').style.width = ((current/total)*100)+'%';
  document.getElementById('counter').textContent = current < total ? `${current+1} ${d.of} ${total}` : '';
  const container = document.getElementById('steps-container');
  if (current >= total) {
    container.innerHTML = `<div class="complete-msg"><h2>${d.finish}</h2><p>${d.finishSub}</p><button class="restart-btn" onclick="restart()">${d.restart}</button></div>`;
    document.getElementById('nav-row').style.display = 'none'; return;
  }
  document.getElementById('nav-row').style.display = 'flex';
  const s = d.steps[current];
  container.innerHTML = `<div class="step-card active"><div class="step-header"><div class="step-num${checked[current]?' done':''}">${checked[current]?'✓':(current+1)}</div><div class="step-title">${s.title}</div></div><div class="step-body"><p>${s.body}</p><div style="margin:0.75rem 0 0.25rem">${visuals[s.visual]()}</div>${s.tip ? `<div class="tip">ℹ ${s.tip}</div>` : ''}<button class="check-btn${checked[current]?' done-btn':''}" onclick="toggleCheck(${current})">${checked[current]?`✓ ${d.done}`:`○ ${d.undone}`}</button></div></div>`;
  document.getElementById('prev-btn').disabled = current===0;
  document.getElementById('prev-label').textContent = d.prev;
  document.getElementById('next-label').textContent = current===total-1?(lang==='de'?'Abschliessen':'Finish'):d.next;
}
function toggleCheck(i){checked[i]=!checked[i];render();}
function nextStep(){if(current<=data[lang].steps.length-1){current++;render();}}
function prevStep(){if(current>0){current--;render();}}
function restart(){current=0;checked=new Array(6).fill(false);render();}
render();
</script>
